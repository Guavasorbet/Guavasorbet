<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" viewBox="0 0 860 580">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      text { font-family: 'Fira Code', 'Courier New', monospace; fill: #98FF98; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="580" fill="#000000"/>

  <!-- Divider lines -->
  <line x1="0" y1="50" x2="860" y2="50" stroke="#98FF98" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="110" x2="860" y2="110" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="170" x2="860" y2="170" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="230" x2="860" y2="230" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="290" x2="860" y2="290" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="350" x2="860" y2="350" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="410" x2="860" y2="410" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="470" x2="860" y2="470" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="530" x2="860" y2="530" stroke="#98FF98" stroke-width="0.5" opacity="0.15"/>

  <!-- Header -->
  <text x="30" y="32" font-size="12" font-weight="500" letter-spacing="2" opacity="0.7" text-decoration="none" font-family="'Fira Code', monospace">CATEGORY</text>
  <text x="430" y="32" font-size="12" font-weight="500" letter-spacing="2" opacity="0.7" font-family="'Fira Code', monospace">TOOLS</text>

  <!-- Row 1 -->
  <text x="30" y="88" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Network Simulation</text>
  <text x="430" y="88" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">Cisco Packet Tracer</text>

  <!-- Row 2 -->
  <text x="30" y="148" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Packet Analysis</text>
  <text x="430" y="148" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">Wireshark</text>

  <!-- Row 3 -->
  <text x="30" y="208" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Vulnerability Scanning</text>
  <text x="430" y="208" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">Nessus, OpenVAS, Nmap</text>

  <!-- Row 4 -->
  <text x="30" y="268" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Endpoint Security</text>
  <text x="430" y="268" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">Windows Defender, PowerShell, Sysinternals</text>

  <!-- Row 5 -->
  <text x="30" y="328" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Linux Security</text>
  <text x="430" y="328" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">Bash, chmod, iptables, auditd</text>

  <!-- Row 6 -->
  <text x="30" y="388" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Cryptography</text>
  <text x="430" y="388" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">OpenSSL, GPG</text>

  <!-- Row 7 -->
  <text x="30" y="448" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Malware Analysis</text>
  <text x="430" y="448" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">VirusTotal, online sandboxes</text>

  <!-- Row 8 -->
  <text x="30" y="508" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Log Management</text>
  <text x="430" y="508" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">Syslog, centralized logging tools</text>

  <!-- Row 9 -->
  <text x="30" y="568" font-size="14" font-weight="500" font-family="'Fira Code', monospace">Frameworks</text>
  <text x="430" y="568" font-size="14" opacity="0.85" font-family="'Fira Code', monospace">OWASP, NIST</text>
</svg>
